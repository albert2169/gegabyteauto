name: gegabyteauto
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  # Navigation
  auto_route: ^9.3.0
  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  # Dependency injection
  get_it: ^7.6.7
  injectable: ^2.3.2
  flutter_debouncer: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Code generation
  build_runner: ^2.4.8
  auto_route_generator: ^9.3.0
  injectable_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
  - assets/car_brands/
  - lib/data/json/brand_model_seria_json.json
